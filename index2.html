<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Time Timer</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    font-family:Arial,sans-serif;
}


.timer{

    position:relative;

    width:500px;
    height:700px;

    z-index:10;

    transform:translate(0px,0px) scale(0.65);

    transform-origin:center center;

    cursor:grab;

}


/* 원판 */

.dial{

    position:absolute;

    left:90px;
    top:90px;

    width:320px;
    height:320px;

    border-radius:50%;

    background:white;

    box-shadow:
    inset 0 0 15px rgba(255,255,255,.15),
    inset 0 0 30px rgba(0,0,0,.5);

}



/* 눈금 */

.tick{

    position:absolute;

    left:250px;
    top:250px;

    background:#111;

    transform-origin:center center;

}



/* 숫자 */

.number{

    position:absolute;

    color:#111;

    font-size:20px;

    font-weight:bold;

    transform:translate(-50%,-50%);

}



/* 분침 */

.hand{

    position:absolute;

    left:250px;

    top:250px;

    width:4px;

    height:155px;

    background:white;

    border-radius:10px;

    transform-origin:bottom center;

    z-index:20;

}



/* 조절점 */

.handle{

    position:absolute;

    width:14px;

    height:14px;

    background:white;

    border-radius:50%;

    cursor:pointer;

    z-index:30;

}



/* 시간 */

.time-display{

    position:absolute;

    top:500px;

    width:500px;

    text-align:center;

    color:#111;

    font-size:32px;

    font-weight:bold;

}



/* 버튼 */

.controls{

    position:absolute;

    top:560px;

    width:500px;

    text-align:center;

}



button{

    width:95px;

    height:42px;

    margin:6px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    font-size:14px;

    font-weight:600;

    color:#333;

    background:rgba(255,255,255,0.75);

    backdrop-filter:blur(12px);

    box-shadow:
    0 8px 20px rgba(0,0,0,0.12);

    transition:
    transform .2s ease,
    box-shadow .2s ease,
    background .2s ease;

}



button:hover{

    transform:translateY(-4px);

    background:white;

    box-shadow:
    0 14px 28px rgba(0,0,0,0.18);

}



button:active{

    transform:scale(0.95);

    box-shadow:
    0 5px 12px rgba(0,0,0,0.15);

}



/* 크기 조절 */

.resize-handle{

    position:absolute;

    right:20px;

    bottom:20px;

    width:18px;

    height:18px;

    background:#111;

    border-radius:50%;

    cursor:nwse-resize;

    z-index:100;

}



.start{

    color:white;

    background:#111;

}


.pause{

    color:#111;

    background:#f2f2f2;

}


.reset{

    color:white;

    background:#ef2348;

}



.start:hover{

    background:#333;

}



.reset:hover{

    background:#ff3d60;

}





@media (prefers-color-scheme:dark){


body{

    background:transparent;

}



.dial{

    background:#111;

    box-shadow:
    inset 0 0 15px rgba(255,255,255,.1),
    inset 0 0 30px rgba(0,0,0,.8);

}



.tick{

    background:#fff;

}



.number{

    color:#fff;

}



.time-display{

    color:#fff;

}



.hand{

    background:#111;

}



.handle{

    background:#111;

}



button{

    color:#fff;

    background:rgba(255,255,255,.12);

    box-shadow:
    0 8px 20px rgba(0,0,0,.35);

}



button:hover{

    background:rgba(255,255,255,.22);

}



.start{

    color:#111;

    background:#fff;

}



.pause{

    color:#fff;

    background:rgba(255,255,255,.15);

}



.reset{

    color:#fff;

    background:#ef2348;

}



.resize-handle{

    background:#fff;

}
.timer{
    user-select:none;
}


}

.move-area{

    position:absolute;

    width:540px;

    height:740px;

    cursor:grab;

    z-index:0;

}


</style>

</head>

<body>


<div class="move-area"></div>
<div class="timer">


<div class="dial"></div>

<div class="hand"></div>

<div class="handle"></div>


<div class="time-display">

01:00:00

</div>


<div class="controls">

<button class="start" onclick="startTimer()">▶ 시작</button>

<button class="pause" onclick="pauseTimer()">⏸ 정지</button>

<button class="reset" onclick="resetTimer()">↻ 초기화</button>

</div>


<div class="resize-handle"></div>


</div>


<script>


const timer=document.querySelector(".timer");

const dial=document.querySelector(".dial");

const hand=document.querySelector(".hand");

const handle=document.querySelector(".handle");

const timeDisplay=document.querySelector(".time-display");

const center=250;


/* 종료 알람 */

function playAlarm(){


    if(!audioCtx){

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    }


    function beep(delay){


        setTimeout(()=>{


            const osc = audioCtx.createOscillator();

            const gain = audioCtx.createGain();


            osc.type="square";

            osc.frequency.value=880;


            gain.gain.value=0.35;


            osc.connect(gain);

            gain.connect(audioCtx.destination);


            osc.start();


            setTimeout(()=>{

                osc.stop();

            },250);



        },delay);


    }



    // 삐삐삐 10번

    for(let i=0;i<10;i++){

        beep(i*400);

    }


}


for(let i=0;i<60;i++){


const tick=document.createElement("div");


tick.className="tick";


tick.style.height=(i%5===0?18:10)+"px";


tick.style.width=(i%5===0?3:2)+"px";


tick.style.transform=
`translate(-50%,-50%) rotate(${i*6}deg) translateY(-180px)`;


timer.appendChild(tick);


}



const nums=[0,5,10,15,20,25,30,35,40,45,50,55];


nums.forEach((n,i)=>{


const angle=(i*30-90)*Math.PI/180;


const r=215;


const div=document.createElement("div");


div.className="number";


div.innerHTML=n;


div.style.left=
`${center+Math.cos(angle)*r}px`;


div.style.top=
`${center+Math.sin(angle)*r}px`;


timer.appendChild(div);


});


let selectedSeconds=3600;

let remainingSeconds=3600;

let timerInterval=null;

// 아이폰 오디오용
let audioCtx=null;


function updateDisplay(){


let h=Math.floor(remainingSeconds/3600);


let m=Math.floor((remainingSeconds%3600)/60);


let s=remainingSeconds%60;


timeDisplay.innerHTML=
`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;


}

function setTimer(angle){

    angle=Math.max(0,Math.min(360,angle));


    dial.style.background=

    angle===360

    ?

    "#ef2348"

    :

    `conic-gradient(#ef2348 0deg ${angle}deg,white ${angle}deg 360deg)`;


    hand.style.transform=

    `translate(-50%,-100%) rotate(${angle}deg)`;


    const r=155;


    handle.style.left=

    `${center+Math.sin(angle*Math.PI/180)*r-7}px`;


    handle.style.top=

    `${center-Math.cos(angle*Math.PI/180)*r-7}px`;

}





function startTimer(){

    if(timerInterval)return;


    // 아이폰 오디오 권한 활성화
    if(!audioCtx){

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    }


    if(audioCtx.state==="suspended"){

        audioCtx.resume();

    }


    timerInterval=setInterval(()=>{


        if(remainingSeconds<=0){

        clearInterval(timerInterval);

        timerInterval=null;


        playAlarm();


        return;

        }


        remainingSeconds--;


        setTimer(remainingSeconds/10);


        updateDisplay();


    },1000);

}





function pauseTimer(){

    clearInterval(timerInterval);

    timerInterval=null;

}





function resetTimer(){

    pauseTimer();


    remainingSeconds=selectedSeconds;


    setTimer(360);


    updateDisplay();

}





/* 손잡이 드래그 */

/* 손잡이 터치 + 마우스 드래그 */

let dragging=false;


function moveHandle(clientX,clientY){

    const rect=timer.getBoundingClientRect();


    const x=clientX-(rect.left+250*0.65);

    const y=clientY-(rect.top+250*0.65);


    let angle=Math.atan2(x,-y)*180/Math.PI;


    if(angle<0) angle+=360;


    angle=Math.round(angle/6)*6;


    selectedSeconds=angle*10;

    remainingSeconds=selectedSeconds;


    setTimer(angle);

    updateDisplay();

}



/* PC */

handle.addEventListener("mousedown",(e)=>{

    if(timerInterval)return;

    dragging=true;

    e.preventDefault();

});



document.addEventListener("mousemove",(e)=>{

    if(!dragging)return;

    moveHandle(e.clientX,e.clientY);

});



document.addEventListener("mouseup",()=>{

    dragging=false;

});





/* 모바일 / 아이패드 */

handle.addEventListener("touchstart",(e)=>{

    if(timerInterval)return;

    e.stopPropagation();

    dragging=true;

    e.preventDefault();

},{passive:false});



document.addEventListener("touchmove",(e)=>{

    if(!dragging)return;


    const touch=e.touches[0];


    moveHandle(
        touch.clientX,
        touch.clientY
    );


},{passive:false});



/* =========================
   원판 터치 시간 설정 (아이폰)
========================= */


function setFromPosition(clientX, clientY){

    const rect = timer.getBoundingClientRect();


    // scale 0.65 적용 보정
    const x = clientX - (rect.left + 250 * 0.65);
    const y = clientY - (rect.top + 250 * 0.65);


    let angle = Math.atan2(x, -y) * 180 / Math.PI;


    if(angle < 0){
        angle += 360;
    }


    // 5분 단위 눈금
    angle = Math.round(angle / 30) * 30;


    selectedSeconds = angle * 10;

    remainingSeconds = selectedSeconds;


    setTimer(angle);

    updateDisplay();

}



/* 아이폰 터치 */

timer.addEventListener("touchstart",(e)=>{


    if(timerInterval) return;


    const target=e.target;


    // 버튼 터치 제외
    if(target.tagName==="BUTTON"){
        return;
    }


    // 크기 조절점 제외
    if(target.classList.contains("resize-handle")){
        return;
    }


    const touch=e.touches[0];


    setFromPosition(
        touch.clientX,
        touch.clientY
    );


    e.preventDefault();


},{passive:false});




/* PC 클릭 */

timer.addEventListener("mousedown",(e)=>{


    if(timerInterval) return;


    if(e.target.tagName==="BUTTON"){
        return;
    }


    if(e.target.classList.contains("resize-handle")){
        return;
    }


    setFromPosition(
        e.clientX,
        e.clientY
    );


});





/* 이동 + 크기 조절 */


const resizeHandle=document.querySelector(".resize-handle");


let resizing=false;

let moving=false;


let startX=0;

let startScale=0.65;


let posX=0;

let posY=0;


let moveStartX=0;

let moveStartY=0;




resizeHandle.addEventListener("mousedown",(e)=>{


    resizing=true;


    startX=e.clientX;


    e.stopPropagation();


    e.preventDefault();


});





document.querySelector(".move-area").addEventListener("mousedown",(e)=>{

    document.querySelector(".move-area").addEventListener("touchstart",(e)=>{


    if(e.target===handle) return;


    if(
        e.target.classList.contains("dial") ||
        e.target.classList.contains("tick") ||
        e.target.classList.contains("number") ||
        e.target.classList.contains("hand")
    ){
        return;
    }


    if(e.target.tagName==="BUTTON"){
        return;
    }


    moving=true;


    const touch=e.touches[0];


    moveStartX=touch.clientX-posX;

    moveStartY=touch.clientY-posY;


},{passive:false});



document.addEventListener("touchmove",(e)=>{


    if(!moving)return;


    const touch=e.touches[0];


    posX=touch.clientX-moveStartX;

    posY=touch.clientY-moveStartY;


    timer.style.transform=
    `translate(${posX}px,${posY}px) scale(${startScale})`;


},{passive:false});



document.addEventListener("touchend",()=>{

    moving=false;

});

    // 크기 조절 점 제외
    if(e.target===resizeHandle) return;


    // 손잡이 제외
    if(e.target===handle) return;


    // 버튼 제외
    if(e.target.tagName==="BUTTON") return;


    // 원판/숫자/눈금 제외
    if(
        e.target.classList.contains("dial") ||
        e.target.classList.contains("tick") ||
        e.target.classList.contains("number") ||
        e.target.classList.contains("hand")
    ){
        return;
    }


    moving=true;


    moveStartX=e.clientX-posX;

    moveStartY=e.clientY-posY;


    timer.style.cursor="grabbing";


});






document.addEventListener("mousemove",(e)=>{


    /* 크기 변경 */


    if(resizing){


        let scale=startScale+(e.clientX-startX)/300;


        scale=Math.max(0.3,Math.min(1.5,scale));


        timer.style.transform=

        `translate(${posX}px,${posY}px) scale(${scale})`;

    }





    /* 위치 이동 */


    if(moving){


        posX=e.clientX-moveStartX;


        posY=e.clientY-moveStartY;



        let matrix=getComputedStyle(timer).transform;


        let scale=0.65;


        if(matrix!=="none"){

            scale=parseFloat(matrix.split(",")[0].replace("matrix(",""));

        }



        timer.style.transform=

        `translate(${posX}px,${posY}px) scale(${scale})`;

    }


});






document.addEventListener("mouseup",()=>{


    resizing=false;


    moving=false;


    timer.style.cursor="grab";


});





setTimer(360);

updateDisplay();



</script>


</body>

</html>
