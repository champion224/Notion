<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Time Timer</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    font-family:Arial,sans-serif;
}

.timer{
    position:relative;
    width:500px;
    height:700px;
}

/* 원판 */
.dial{
    position:absolute;
    left:90px;
    top:90px;
    width:320px;
    height:320px;
    border-radius:50%;
    background:white;
    box-shadow:
    inset 0 0 15px rgba(255,255,255,.15),
    inset 0 0 30px rgba(0,0,0,.5);
}

/* 눈금 */
.tick{
    position:absolute;
    left:250px;
    top:250px;
    background:#111;
    transform-origin:center center;
}

/* 숫자 */
.number{
    position:absolute;
    color:#111;
    font-size:20px;
    font-weight:bold;
    transform:translate(-50%,-50%);
}

/* 분침 */
.hand{
    position:absolute;
    left:250px;
    top:250px;
    width:4px;
    height:155px;
    background:white;
    border-radius:10px;
    transform-origin:bottom center;
    z-index:20;
}

/* 조절점 */
.handle{
    position:absolute;
    width:14px;
    height:14px;
    background:white;
    border-radius:50%;
    cursor:pointer;
    z-index:30;
}

/* 시간 표시 */
.time-display{
    position:absolute;
    top:500px;
    width:500px;
    text-align:center;
    color:#111;
    font-size:32px;
    font-weight:bold;
}

/* 버튼 영역 */
.controls{
    position:absolute;
    top:560px;
    width:500px;
    text-align:center;
}

/* 버튼 */
button{
    width:95px;
    height:42px;
    margin:6px;
    border:none;
    border-radius:22px;
    cursor:pointer;
    font-size:14px;
    font-weight:bold;
    color:#222;
    background:linear-gradient(145deg,#ffffff,#e6e6e6);
    box-shadow:
    0 6px 12px rgba(0,0,0,.15),
    inset 0 2px 3px rgba(255,255,255,.8);
    transition:
    transform .15s ease,
    box-shadow .15s ease;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:
    0 10px 18px rgba(0,0,0,.2),
    inset 0 2px 3px rgba(255,255,255,.9);
}

button:active{
    transform:translateY(2px);
    box-shadow:
    0 3px 6px rgba(0,0,0,.2),
    inset 0 3px 5px rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="timer">

    <div class="dial"></div>
    <div class="hand"></div>
    <div class="handle"></div>

    <div class="time-display">
        01:00:00
    </div>

    <div class="controls">
        <button onclick="startTimer()">▶ 시작</button>
        <button onclick="pauseTimer()">⏸ 정지</button>
        <button onclick="resetTimer()">🔄 초기화</button>
    </div>

</div>

<script>
const timer=document.querySelector(".timer");
const dial=document.querySelector(".dial");
const hand=document.querySelector(".hand");
const handle=document.querySelector(".handle");
const timeDisplay=document.querySelector(".time-display");

const center=250;


// 눈금 생성
for(let i=0;i<60;i++){

    const tick=document.createElement("div");
    tick.className="tick";

    tick.style.height=(i%5===0?18:10)+"px";
    tick.style.width=(i%5===0?3:2)+"px";

    tick.style.transform=
    `translate(-50%,-50%)
     rotate(${i*6}deg)
     translateY(-180px)`;

    timer.appendChild(tick);
}


// 숫자 생성
const nums=[0,5,10,15,20,25,30,35,40,45,50,55];

nums.forEach((n,i)=>{

    const angle=(i*30-90)*Math.PI/180;
    const r=215;

    const div=document.createElement("div");

    div.className="number";
    div.innerHTML=n;

    div.style.left=`${center+Math.cos(angle)*r}px`;
    div.style.top=`${center+Math.sin(angle)*r}px`;

    timer.appendChild(div);
});


let selectedSeconds=3600;
let remainingSeconds=3600;
let timerInterval=null;


function updateDisplay(){

    let h=Math.floor(remainingSeconds/3600);
    let m=Math.floor((remainingSeconds%3600)/60);
    let s=remainingSeconds%60;

    timeDisplay.innerHTML=
    `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}


function setTimer(angle){

    angle=Math.max(0,Math.min(360,angle));

    dial.style.background=
    angle===360
    ? "#ef2348"
    :
    `conic-gradient(#ef2348 0deg ${angle}deg,white ${angle}deg 360deg)`;


    hand.style.transform=
    `translate(-50%,-100%) rotate(${angle}deg)`;


    const r=155;

    handle.style.left=
    `${center+Math.sin(angle*Math.PI/180)*r-7}px`;

    handle.style.top=
    `${center-Math.cos(angle*Math.PI/180)*r-7}px`;
}


function startTimer(){

    if(timerInterval)return;

    timerInterval=setInterval(()=>{

        if(remainingSeconds<=0){
            clearInterval(timerInterval);
            timerInterval=null;
            return;
        }

        remainingSeconds--;

        setTimer(remainingSeconds/10);
        updateDisplay();

    },1000);
}


function pauseTimer(){

    clearInterval(timerInterval);
    timerInterval=null;
}


function resetTimer(){

    pauseTimer();

    remainingSeconds=selectedSeconds;

    setTimer(360);
    updateDisplay();
}


let dragging=false;


handle.addEventListener("mousedown",()=>{

    if(timerInterval)return;

    dragging=true;

});


document.addEventListener("mouseup",()=>{

    dragging=false;

});


document.addEventListener("mousemove",(e)=>{

    if(!dragging)return;

    const rect=timer.getBoundingClientRect();

    const x=e.clientX-(rect.left+center);
    const y=e.clientY-(rect.top+center);

    let angle=Math.atan2(x,-y)*180/Math.PI;

    if(angle<0) angle+=360;

    angle=Math.round(angle/6)*6;

    if(angle>360) angle=360;


    selectedSeconds=angle*10;
    remainingSeconds=selectedSeconds;

    setTimer(angle)
    updateDisplay();

});


setTimer(360);
updateDisplay();

</script>

</body>
</html>
