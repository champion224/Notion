<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculator</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}


body{

    margin:0;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#ffffff;

    font-family:
    "Pretendard",
    "Apple SD Gothic Neo",
    sans-serif;

    zoom:0.9;

}



/* =====================
   Glass Card
===================== */


.calculator{

    width:330px;

    padding:26px;


    border-radius:34px;


    background:

    rgba(255,255,255,.7);


    backdrop-filter:

    blur(18px);


    -webkit-backdrop-filter:

    blur(18px);



    border:

    1px solid #dedede;



    box-shadow:

    0 8px 25px rgba(0,0,0,.04);

    /* 크기 조절 */ transform:scale(0.8);

}




/* 계산 기록 */

.history{

    height:22px;

    text-align:right;


    color:#bcbcbc;


    font-size:12px;


    letter-spacing:.5px;

}





/* 숫자 표시 */

.display{


    height:92px;


    display:flex;

    justify-content:flex-end;

    align-items:center;



    font-family:

    "SF Pro Display",
    "Helvetica Neue",
    Arial,
    sans-serif;



    font-size:50px;


    font-weight:450;


    letter-spacing:-2px;



    color:#222;



    overflow:hidden;

}





/* 버튼 영역 */

.buttons{


    display:grid;


    grid-template-columns:repeat(4,1fr);


    gap:12px;


}





/* 버튼 */


button{


    height:50px;


    border:none;


    border-radius:17px;



    background:rgba(245,245,245,.85);



    color:#333;



    font-size:24px;



    font-weight:400;



    cursor:pointer;



    transition:

    transform .18s ease,

    background .18s ease,

    box-shadow .18s ease;



    box-shadow:


    0 2px 6px rgba(0,0,0,.05);


}




button:hover{


    transform:translateY(-2px);



    background:#ffffff;



    box-shadow:


    0 5px 12px rgba(0,0,0,.08);


}





button:active{


    transform:scale(.94);



    box-shadow:none;


}





/* 연산 버튼 */


.operator{


    background:#d6a64a;



    color:white;



    box-shadow:


    0 3px 8px rgba(255, 171, 14, 0.25);


}




.operator:hover{


    background:#c99739;


}





/* 초기화 */


.clear{


    background:#e5e5e5;


    color:#666;


}





/* 0 버튼 */


.zero{


    grid-column:span 2;


    text-align:left;


    padding-left:24px;


}




</style>

</head>


<body>


<div class="calculator">


<div class="history" id="history"></div>


<div class="display" id="display">
0
</div>



<div class="buttons">


<button class="clear" onclick="clearAll()">AC</button>

<button onclick="append('(')">(</button>

<button onclick="append(')')">)</button>

<button class="operator" onclick="append('/')">÷</button>



<button onclick="append('7')">7</button>

<button onclick="append('8')">8</button>

<button onclick="append('9')">9</button>

<button class="operator" onclick="append('*')">×</button>



<button onclick="append('4')">4</button>

<button onclick="append('5')">5</button>

<button onclick="append('6')">6</button>

<button class="operator" onclick="append('-')">−</button>



<button onclick="append('1')">1</button>

<button onclick="append('2')">2</button>

<button onclick="append('3')">3</button>

<button class="operator" onclick="append('+')">+</button>



<button class="zero" onclick="append('0')">
0
</button>

<button onclick="append('.')">
.
</button>

<button class="operator" onclick="calculate()">
=
</button>


</div>


</div>




<script>


let expression="";


const display=document.getElementById("display");

const history=document.getElementById("history");



function append(value){


    expression += value;


    display.innerText=formatNumber(expression);


}




function clearAll(){


    expression="";


    display.innerText="0";


    history.innerText="";


}




function calculate(){


try{


    let result=Function(
        "return "+expression
    )();



    history.innerText=expression;



    expression=result;



    display.innerText=formatNumber(result);



}

catch{


    display.innerText="Error";


    expression="";


}


}




function formatNumber(value){


    if(value==="")

        return "0";



    if(/[+\-*/().]/.test(value))

        return value;



    let num=Number(value);



    if(isNaN(num))

        return value;



    return num.toLocaleString("ko-KR");


}





document.addEventListener("keydown",e=>{


    if(
    (e.key>="0"&&e.key<="9")
    || "+-*/().".includes(e.key)
    ){

        append(e.key);

    }


    if(e.key==="Enter")

        calculate();



    if(e.key==="Escape")

        clearAll();


});


</script>


</body>
</html>
